services:
  # Backend Service
  - type: web
    name: lms-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: DATABASE_DRIVER
        value: org.postgresql.Driver
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123

  # Frontend Service
  - type: web
    name: lms-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: lms-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /.*
        destination: /index.html

databases:
  - name: lms-db
    plan: free
    databaseName: lms
    user: lms_user
